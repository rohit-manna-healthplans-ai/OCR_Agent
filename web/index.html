<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OCR Agent</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>OCR Agent</h1>
      <div id="status" class="status">Idle</div>
    </header>

    <section class="card">
      <label class="lbl">Select files (max 10)</label>
      <div class="row row--file">
        <input id="fileInput" type="file" multiple accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png,.webp,.bmp,.tiff,.tif,.gif" />
        <button id="runOcrBtn" type="button" class="btn" onclick="runOcr()">Run OCR</button>
        <div id="timerBox" class="timer-box" aria-label="OCR elapsed time">
          <span class="timer-box__label">Total time</span>
          <span id="timerValue" class="timer-box__value">—</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="resultRow" class="row hidden">
        <label class="lbl">Result</label>
        <select id="resultSelect" onchange="selectResult()"></select>
      </div>
      <div class="tabs">
        <button type="button" class="tabbtn active" onclick="showTab('text')">Extracted Text</button>
        <button type="button" class="tabbtn" onclick="showTab('raw')">Raw JSON</button>
      </div>
      <div id="paneText" class="tabpane">
        <pre id="extractedText" class="pre"></pre>
      </div>
      <div id="paneRaw" class="tabpane hidden">
        <pre id="rawJson" class="pre"></pre>
      </div>
    </section>
  </div>

  <!-- Cache-bust so browser loads latest app.js (avoids old cached script with renderSelected) -->
  <script>
    window.runOcr = window.runOcr || function () { document.getElementById("status").textContent = "Loading..."; };
    window.showTab = window.showTab || function () {};
    window.selectResult = window.selectResult || function () {};
  </script>
  <script src="/app.js?v=4"></script>
</body>
</html>
